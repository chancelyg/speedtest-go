# Phase 4 Track E — agent E to flesh out.
name: Feature request
description: Propose a change or addition
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Single-binary / zero-dependency boundary
      options:
        - label: My proposal does not add a new Go module or frontend build step
