<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Maskable-safe: all visual elements live inside the central 80% safe zone
       (radius 76.8 from the centre) so OS launcher mask cropping never clips
       the gauge or arrows. Background fills the full square. -->
  <rect width="192" height="192" rx="32" ry="32" fill="#0b1220"/>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Gauge arc (semi-circle, opens downward). -->
  <path d="M 48 124 A 48 48 0 0 1 144 124"
        fill="none" stroke="#1f2937" stroke-width="14" stroke-linecap="round"/>
  <path d="M 48 124 A 48 48 0 0 1 132 96"
        fill="none" stroke="url(#g)" stroke-width="14" stroke-linecap="round"/>
  <!-- Needle. -->
  <line x1="96" y1="124" x2="124" y2="78"
        stroke="#e2e8f0" stroke-width="6" stroke-linecap="round"/>
  <circle cx="96" cy="124" r="8" fill="#e2e8f0"/>
  <!-- Up/down chevrons hinting at upload/download speed. -->
  <path d="M 70 156 L 80 144 L 90 156" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 102 144 L 112 156 L 122 144" fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
