<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speedtest</title>
  <script>
    try {
      var savedTheme = localStorage.getItem('speedtest_theme');
      var dark = savedTheme ? savedTheme === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    } catch (_) {}
  </script>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <h1 id="title">网络测速</h1>
      </div>
      <nav class="topbar-actions">
        <button id="lang-toggle" class="pill">English</button>
        <button id="theme-toggle" class="pill icon-pill" aria-label="toggle theme">🌙</button>
      </nav>
    </header>

    <main class="stack">
      <!-- Gauges -->
      <section class="gauges">
        <article class="gauge-card" data-prefix="download">
          <header class="gauge-head">
            <span class="gauge-icon" aria-hidden="true">↓</span>
            <span class="gauge-title" id="download-label">下载速度</span>
          </header>
          <div class="gauge-body">
            <svg class="gauge-svg" viewBox="0 0 200 130" aria-hidden="true">
              <defs>
                <linearGradient id="downloadGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%"   class="gauge-stop-from" />
                  <stop offset="100%" class="gauge-stop-to" />
                </linearGradient>
              </defs>
              <path class="gauge-track" d="M 20 110 A 80 80 0 0 1 180 110" />
              <path class="gauge-fill" id="download-fill"
                    d="M 20 110 A 80 80 0 0 1 180 110"
                    stroke="url(#downloadGradient)" />
              <g class="gauge-ticks" aria-hidden="true">
                <text x="10"  y="124" class="gauge-tick">0.1</text>
                <text x="36"  y="46"  class="gauge-tick">1</text>
                <text x="100" y="16"  class="gauge-tick">10</text>
                <text x="164" y="46"  class="gauge-tick">100</text>
                <text x="190" y="124" class="gauge-tick">1k</text>
              </g>
              <line class="gauge-needle" id="download-needle"
                    x1="100" y1="110" x2="100" y2="55"
                    transform="rotate(-90 100 110)" />
              <circle class="gauge-pivot" cx="100" cy="110" r="5" />
            </svg>
          </div>
          <div class="gauge-readout">
            <span class="gauge-value" id="download-speed">--</span>
            <span class="gauge-unit">Mbps</span>
          </div>
          <div class="gauge-sub" id="download-speed-mb"></div>
          <div class="gauge-stats">
            <span class="gauge-stat">
              <span class="gauge-stat-label" id="download-latency-label">延迟</span>
              <span class="gauge-stat-value" id="download-latency">--</span>
            </span>
            <span class="gauge-stat">
              <span class="gauge-stat-label" id="download-jitter-label">抖动</span>
              <span class="gauge-stat-value" id="download-jitter">--</span>
            </span>
          </div>
        </article>

        <article class="gauge-card" data-prefix="upload">
          <header class="gauge-head">
            <span class="gauge-icon" aria-hidden="true">↑</span>
            <span class="gauge-title" id="upload-label">上传速度</span>
          </header>
          <div class="gauge-body">
            <svg class="gauge-svg" viewBox="0 0 200 130" aria-hidden="true">
              <defs>
                <linearGradient id="uploadGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%"   class="gauge-stop-from" />
                  <stop offset="100%" class="gauge-stop-to" />
                </linearGradient>
              </defs>
              <path class="gauge-track" d="M 20 110 A 80 80 0 0 1 180 110" />
              <path class="gauge-fill" id="upload-fill"
                    d="M 20 110 A 80 80 0 0 1 180 110"
                    stroke="url(#uploadGradient)" />
              <g class="gauge-ticks" aria-hidden="true">
                <text x="10"  y="124" class="gauge-tick">0.1</text>
                <text x="36"  y="46"  class="gauge-tick">1</text>
                <text x="100" y="16"  class="gauge-tick">10</text>
                <text x="164" y="46"  class="gauge-tick">100</text>
                <text x="190" y="124" class="gauge-tick">1k</text>
              </g>
              <line class="gauge-needle" id="upload-needle"
                    x1="100" y1="110" x2="100" y2="55"
                    transform="rotate(-90 100 110)" />
              <circle class="gauge-pivot" cx="100" cy="110" r="5" />
            </svg>
          </div>
          <div class="gauge-readout">
            <span class="gauge-value" id="upload-speed">--</span>
            <span class="gauge-unit">Mbps</span>
          </div>
          <div class="gauge-sub" id="upload-speed-mb"></div>
          <div class="gauge-stats">
            <span class="gauge-stat">
              <span class="gauge-stat-label" id="upload-latency-label">延迟</span>
              <span class="gauge-stat-value" id="upload-latency">--</span>
            </span>
            <span class="gauge-stat">
              <span class="gauge-stat-label" id="upload-jitter-label">抖动</span>
              <span class="gauge-stat-value" id="upload-jitter">--</span>
            </span>
          </div>
        </article>
      </section>

      <!-- Metrics strip -->
      <section class="metrics-card">
        <div class="metric">
          <span class="metric-label" id="packet-loss-label">丢包率</span>
          <span class="metric-value" id="packet-loss">--</span>
        </div>
        <div class="metric">
          <span class="metric-label" id="ip-label">IP 地址</span>
          <span class="metric-value" id="ip-address">--</span>
        </div>
        <div class="metric">
          <span class="metric-label" id="connection-label">连接方式</span>
          <span class="metric-value" id="connection-type">--</span>
        </div>
      </section>

      <!-- Advanced settings -->
      <section class="config-section">
        <button class="config-toggle-btn" id="config-toggle" aria-expanded="false" aria-controls="config-panel">
          <span class="config-toggle-chevron" id="config-chevron" aria-hidden="true">›</span>
          <span id="config-toggle-text">点击展开测试设置</span>
        </button>
        <div class="config-panel" id="config-panel" hidden>
          <div class="config-row">
            <div class="config-group">
              <label class="config-label" id="mode-label">测速模式</label>
              <div class="config-toggle" id="mode-toggle" role="tablist">
                <button class="toggle-btn active" data-value="time" id="mode-time">按时长</button>
                <button class="toggle-btn" data-value="size" id="mode-size">按大小</button>
              </div>
            </div>
            <div class="config-group">
              <label class="config-label" id="streams-label">并发流</label>
              <select class="config-select" id="streams-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="4" selected>4</option>
                <option value="8">8</option>
                <option value="16">16</option>
              </select>
            </div>
          </div>
          <div class="config-row" id="time-config">
            <div class="config-group">
              <label class="config-label" id="duration-label">持续时间</label>
              <select class="config-select" id="duration-select">
                <option value="5">5 秒</option>
                <option value="10">10 秒</option>
                <option value="15" selected>15 秒</option>
                <option value="30">30 秒</option>
                <option value="60">60 秒</option>
              </select>
            </div>
          </div>
          <div class="config-row" id="size-config" style="display:none">
            <div class="config-group">
              <label class="config-label" id="download-size-label">下载大小</label>
              <select class="config-select" id="download-size-select">
                <option value="10">10 MB</option>
                <option value="25" selected>25 MB</option>
                <option value="50">50 MB</option>
                <option value="100">100 MB</option>
                <option value="500">500 MB</option>
              </select>
            </div>
            <div class="config-group">
              <label class="config-label" id="upload-size-label">上传大小</label>
              <select class="config-select" id="upload-size-select">
                <option value="5">5 MB</option>
                <option value="10" selected>10 MB</option>
                <option value="25">25 MB</option>
                <option value="50">50 MB</option>
                <option value="100">100 MB</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <!-- Action buttons -->
      <div class="cta">
        <button id="start-btn" class="btn-primary">
          <span class="btn-dot" aria-hidden="true"></span>
          <span id="start-text">开始测速</span>
        </button>
        <button id="stop-btn" class="btn-stop" hidden>
          <span id="stop-text">停止</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p id="footer-text">Speedtest · Powered by Go</p>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
